<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Poster Making</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="poster-container">
        <div class="van-gogh-bg">
            <div class="swirl swirl-1"></div>
            <div class="swirl swirl-2"></div>
            <div class="swirl swirl-3"></div>
            <div class="swirl swirl-4"></div>
            <div class="swirl swirl-5"></div>
            <div class="swirl swirl-6"></div>
            <div class="swirl swirl-7"></div>
            
            <div class="starry-star starry-1"></div>
            <div class="starry-star starry-2"></div>
            <div class="starry-star starry-3"></div>
            <div class="starry-star starry-4"></div>
            <div class="starry-star starry-5"></div>
        </div>

        <!-- 5 Hearts -->
        <div class="decor-heart heart-1">♡</div>
        <div class="decor-heart heart-2">♡</div>
        <div class="decor-heart heart-3">♡</div>
        <div class="decor-heart heart-4">♡</div>
        <div class="decor-heart heart-5">♡</div>
        
        <!-- 5 Big Stars -->
        <div class="decor-star star-1">✦</div>
        <div class="decor-star star-2">✦</div>
        <div class="decor-star star-3">✧</div>
        <div class="decor-star star-4">✴</div>
        <div class="decor-star star-5">✵</div>
        
        <!-- 1 Shooting Star -->
        <div class="shooting-star"></div>
        
        <div class="decor-dot dot-1"></div>
        <div class="decor-dot dot-2"></div>
        
        <div class="content-wrapper">
            <h1 class="main-quote">
                PEACE OVER PRESSURE,<br>
                FAITH OVER FEAR
            </h1>
            
            <div class="divider-container">
                <div class="divider"></div>
                <span class="center-icon">✧</span>
                <div class="divider"></div>
            </div>
            
            <p class="sub-text">
                Choose calm. Choose belief. Choose you.
            </p>

            <div class="author-container">
                <p class="author-name">✿ Ryzel June Jumao-as</p>
            </div>
        </div>
        
        <div class="footer-note">–A gentle reminder for your heart & soul (⁠◠⁠‿⁠・⁠)⁠—⁠☆</div>
    </div>
</body>
</html>
